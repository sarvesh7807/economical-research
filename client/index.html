<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Economical Research | Your World. Your News. Researched.</title>
    <meta name="description" content="Your World. Your News. Researched. Premium news reporting powered by state-of-the-art AI analysis." />
    <!-- Preload Critical logo -->
    <link rel="preload" href="/logo.png" as="image" type="image/png">
    
    <!-- DNS prefetch & preconnect for trusted third-party services -->
    <link rel="dns-prefetch" href="https://api.openweathermap.org">
    <link rel="preconnect" href="https://api.openweathermap.org">
    <link rel="dns-prefetch" href="https://translate.google.com">
    <link rel="preconnect" href="https://translate.google.com">

    <!-- Google Fonts for GenZ Premium Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Prevent React crashes when Google Translate or other translation tools mutate the DOM -->
    <script>
      (function() {
        if (typeof Node !== 'undefined' && Node.prototype) {
          const originalRemoveChild = Node.prototype.removeChild;
          Node.prototype.removeChild = function(child) {
            if (child.parentNode !== this) {
              if (console) console.warn('removeChild: Parent mismatch, ignoring to prevent crash', this, child);
              return child;
            }
            return originalRemoveChild.apply(this, arguments);
          };

          const originalInsertBefore = Node.prototype.insertBefore;
          Node.prototype.insertBefore = function(newNode, referenceNode) {
            if (referenceNode && referenceNode.parentNode !== this) {
              if (console) console.warn('insertBefore: Parent mismatch, ignoring to prevent crash', this, referenceNode);
              return newNode;
            }
            return originalInsertBefore.apply(this, arguments);
          };

          const originalReplaceChild = Node.prototype.replaceChild;
          Node.prototype.replaceChild = function(newChild, oldChild) {
            if (oldChild.parentNode !== this) {
              if (console) console.warn('replaceChild: Parent mismatch, ignoring to prevent crash', this, oldChild);
              return oldChild;
            }
            return originalReplaceChild.apply(this, arguments);
          };
        }
      })();
    </script>
    <!-- Hide Google Translate Top Banner/Bar (pattii) -->
    <style>
      .goog-te-banner-frame,
      .goog-te-banner-frame.skiptranslate,
      iframe.goog-te-banner-frame,
      .goog-te-balloon-frame,
      iframe.skiptranslate,
      .skiptranslate iframe,
      div.skiptranslate,
      .skiptranslate,
      #google_translate_element,
      .goog-te-gadget,
      .goog-te-gadget-simple,
      .goog-te-gadget-icon,
      #goog-gt-tt,
      .goog-tooltip,
      .goog-tooltip\:hover,
      .goog-te-indicator {
        display: none !important;
        visibility: hidden !important;
        height: 0px !important;
        width: 0px !important;
        opacity: 0 !important;
        pointer-events: none !important;
      }
      body {
        top: 0px !important;
        position: static !important;
      }
      html {
        margin-top: 0px !important;
      }
      .goog-text-highlight {
        background-color: transparent !important;
        border: none !important;
        box-shadow: none !important;
      }
    </style>
    <script>
      (function() {
        const checkAndHide = () => {
          const elements = document.querySelectorAll(
            '.goog-te-banner-frame, .goog-te-banner-frame.skiptranslate, iframe.goog-te-banner-frame, .goog-te-balloon-frame, iframe.skiptranslate, .skiptranslate iframe, div.skiptranslate, .skiptranslate, #google_translate_element, .goog-te-gadget, .goog-te-gadget-simple, .goog-te-gadget-icon, #goog-gt-tt, .goog-tooltip, .goog-te-indicator'
          );
          elements.forEach(el => {
            el.style.setProperty('display', 'none', 'important');
            el.style.setProperty('visibility', 'hidden', 'important');
            el.style.setProperty('height', '0px', 'important');
            el.style.setProperty('width', '0px', 'important');
            el.style.setProperty('opacity', '0', 'important');
            el.style.setProperty('pointer-events', 'none', 'important');
          });
          if (document.body) {
            if (document.body.style.top !== '0px' && document.body.style.top !== '') {
              document.body.style.setProperty('top', '0px', 'important');
            }
            if (document.body.style.position !== 'static' && document.body.style.position !== '') {
              document.body.style.setProperty('position', 'static', 'important');
            }
          }
          if (document.documentElement && document.documentElement.style.marginTop !== '0px' && document.documentElement.style.marginTop !== '') {
            document.documentElement.style.setProperty('margin-top', '0px', 'important');
          }
        };
        // Watch for changes and periodically enforce clean layout
        setInterval(checkAndHide, 100);
        window.addEventListener('DOMContentLoaded', checkAndHide);
        window.addEventListener('load', checkAndHide);
      })();
    </script>
    <!-- Google tag (gtag.js) GA4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-Y5353Y23TB"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-Y5353Y23TB', {
        send_page_view: false
      });
    </script>
  </head>
  <body class="bg-paper text-navy font-sans antialiased transition-colors duration-200 dark:bg-paper-dark dark:text-gray-100">
    <div id="root"></div>
    <!-- Google Translate Widget (Hidden) -->
    <div id="google_translate_element" style="display:none"></div>
    <script>
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'en',
          includedLanguages: 'hi,mr,gu,bn,ta,te,ar,fr,de,es,zh,ja,ru,pt,ur',
          layout: google.translate.TranslateElement.InlineLayout.SIMPLE
        }, 'google_translate_element');
      }
    </script>
    <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
